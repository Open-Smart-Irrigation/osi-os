name: Sync Flow Verifier
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  verify-sync-flow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          # full history: test-sync-history-schema.js resolves the pinned
          # pre-history-sync baseline SHA (issue #84) via `git show <sha>:...`;
          # a shallow clone would silently SKIP the upgrade-path leg.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install sqlite3 CLI
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Verify edge-owned sync contracts and golden operations
        run: |
          node scripts/verify-sync-contract.js
          node scripts/test-contract-schemas.js
      # The repo's main local gate, promoted to CI after issue #84 proved it can
      # break on main invisibly (it chains comm-contract, DB-schema consistency,
      # history schema/worker tests, history API contract, helper tests, and
      # profile parity). Must end with "All parity checks passed."
      - name: Scoped-access endpoint ratchet
        run: node scripts/verify-scoped-access.js
      - run: node scripts/verify-sync-flow.js
      # Parse-checks every function node's func/initialize/finalize in all
      # shipped flows.json profiles. Added after issue #6: dendro-raw-fn
      # shipped with a corrupted regex Node-RED could not compile, so its
      # HTTP route hung (curl exit 28) and no verifier noticed.
      - name: Function-node parse check (all flows.json profiles)
        run: |
          node scripts/verify-flows-fn-parse.js
          node --test scripts/verify-flows-fn-parse.test.js
      - name: Skill-library symlink parity (.agents/skills must alias .claude/skills)
        run: |
          test "$(readlink .agents/skills)" = "../.claude/skills"
          # gitignore must stay narrow: arbitrary .agents/ files ignored, symlink tracked
          git check-ignore -q .agents/notes.txt
          git ls-files --error-unmatch .agents/skills > /dev/null
      - name: Guard against silent upgrade-leg skip
        run: node scripts/test-sync-history-schema.js 2>&1 | tee /tmp/schema.out && grep -q "base seed + history migration" /tmp/schema.out
